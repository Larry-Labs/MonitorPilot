name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Create m1ddc sidecar for macOS x86_64
        if: matrix.target == 'x86_64-apple-darwin'
        run: cp src-tauri/binaries/m1ddc-aarch64-apple-darwin src-tauri/binaries/m1ddc-x86_64-apple-darwin

      - name: Create placeholder sidecar for non-macOS
        if: matrix.platform != 'macos-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            touch "src-tauri/binaries/m1ddc-${{ matrix.target }}.exe"
          else
            touch "src-tauri/binaries/m1ddc-${{ matrix.target }}"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MonitorPilot ${{ github.ref_name }}'
          releaseBody: 'See the assets to download the installer for your platform.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
